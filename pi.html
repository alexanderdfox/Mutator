<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>π-Symphony: Infinite Generative Audio</title>
	<style>
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1b 100%);
			color: #00d4ff;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			overflow: hidden;
		}
		#visualizer {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: -1;
			opacity: 0.3;
		}
		.container {
			text-align: center;
			background: rgba(0, 0, 0, 0.6);
			padding: 2rem;
			border-radius: 15px;
			border: 1px solid #00d4ff;
			box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
			backdrop-filter: blur(10px);
		}
		h1 { margin-top: 0; letter-spacing: 4px; text-transform: uppercase; }
		.digit-display { font-size: 2rem; margin: 1rem 0; color: #fff; text-shadow: 0 0 10px #00d4ff; }
		button {
			background: transparent;
			color: #00d4ff;
			border: 2px solid #00d4ff;
			padding: 12px 30px;
			cursor: pointer;
			font-size: 18px;
			font-weight: bold;
			transition: 0.3s;
			border-radius: 5px;
		}
		button:hover { background: #00d4ff; color: #111; box-shadow: 0 0 15px #00d4ff; }
	</style>
</head>
<body>

<canvas id="visualizer"></canvas>

<div class="container">
	<h1>π - Symphony</h1>
	<div class="digit-display" id="pi-bits">3.1415...</div>
	<button id="start">INITIALIZE SEQUENCE</button>
</div>

<script>
const piDigits = "3141592653589793238462643383279502884197169399375105820974944592307816406286208998628034825342117067";

// A Minor Pentatonic Scale Frequencies (C4 to C6)
const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let currentIndex = 0;
const digitEl = document.getElementById('pi-bits');

// Visualizer Setup
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function playSynth(freq, type, volume, duration) {
	const osc = audioCtx.createOscillator();
	const gain = audioCtx.createGain();
	
	osc.type = type;
	osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
	
	gain.gain.setValueAtTime(volume, audioCtx.currentTime);
	gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
	
	osc.connect(gain);
	gain.connect(audioCtx.destination);
	
	osc.start();
	osc.stop(audioCtx.currentTime + duration);
}

function playSequence() {
	setInterval(() => {
		let d = parseInt(piDigits[currentIndex % piDigits.length]);
		
		// 1. Lead Instrument (Triangle wave - soft & melodic)
		// Maps 0-9 to the pentatonic scale
		let leadFreq = scale[d];
		playSynth(leadFreq, 'triangle', 0.1, 0.5);

		// 2. Bass Instrument (Sine wave - deep)
		// Plays every 4th digit for a steady rhythm
		if (currentIndex % 4 === 0) {
			let bassFreq = scale[d % 5] / 2; // Octave lower
			playSynth(bassFreq, 'sine', 0.2, 1.2);
			drawPulse();
		}

		digitEl.innerText = `...${piDigits.substring(currentIndex, currentIndex + 5)}...`;
		currentIndex++;
	}, 250);
}

function drawPulse() {
	ctx.fillStyle = 'rgba(0, 212, 255, 0.1)';
	ctx.beginPath();
	ctx.arc(canvas.width/2, canvas.height/2, Math.random() * 300, 0, Math.PI*2);
	ctx.fill();
	setTimeout(() => ctx.clearRect(0,0, canvas.width, canvas.height), 100);
}

document.getElementById('start').addEventListener('click', function() {
	if (audioCtx.state === 'suspended') audioCtx.resume();
	this.style.display = 'none';
	playSequence();
});
</script>
</body>
</html>
