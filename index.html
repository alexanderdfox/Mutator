<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DNA Hybrid | Evolution Edition</title>
    <style>
        :root { --neon: #00f2ff; --case: #1a1a1a; --led: #00ff66; --accent: #ff0055; --mutate: #ffcc00; }
        body { margin: 0; background: #050505; color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        #main-container { display: flex; align-items: center; gap: 40px; position: relative; z-index: 10; }
        .helix-canvas { width: 100px; height: 600px; filter: drop-shadow(0 0 8px var(--neon)); opacity: 0.8; }

        #pedal-board { background: var(--case); width: 550px; padding: 30px; border-radius: 20px; border: 4px solid #333; box-shadow: 0 20px 60px rgba(0,0,0,0.9); position: relative; }
        
        .display-area { background: #000; border: 2px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 10px; position: relative; }
        #dnaInput { background: transparent; color: var(--neon); border: none; font-size: 1.5rem; letter-spacing: 8px; width: 100%; text-align: center; text-transform: uppercase; outline: none; }
        
        .interface { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .knob-group { display: flex; gap: 12px; }
        .knob { text-align: center; width: 45px; }
        .knob input { appearance: none; background: #333; height: 4px; width: 50px; transform: rotate(-90deg) translate(-25px, 0); margin-bottom: 45px; display: block; }
        .label { font-size: 0.5rem; color: #888; margin-top: 5px; font-weight: bold; }

        .stomp-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .led { width: 12px; height: 12px; background: #131; border-radius: 50%; border: 2px solid #000; transition: 0.2s; }
        .led.on { background: var(--led); box-shadow: 0 0 15px var(--led); }
        .led.accent.on { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .led.mutate-led.on { background: var(--mutate); box-shadow: 0 0 15px var(--mutate); }
        
        .stomp { width: 65px; height: 65px; background: #444; border-radius: 50%; border: 5px solid #222; cursor: pointer; box-shadow: 0 5px 0 #111; transition: 0.1s; color: #111; font-weight: bold; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5px; }
        .stomp:active { transform: translateY(4px); box-shadow: 0 1px 0 #111; }
        .stomp.active { background: #555; color: #fff; }

        .keys { display: flex; gap: 3px; width: 100%; height: 60px; margin-top: 10px; }
        .key { flex: 1; border: 1px solid rgba(0,242,255,0.1); border-radius: 0 0 4px 4px; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; font-size: 8px; transition: 0.1s; background: rgba(0, 242, 255, 0.05); }
        .key.playing { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        #scope { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; opacity: 0.4; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="scope"></canvas>

<div id="main-container">
    <canvas id="helixLeft" class="helix-canvas"></canvas>

    <div id="pedal-board">
        <div class="display-area">
            <input type="text" id="dnaInput" value="ATCGATCG" maxlength="12">
            <div style="font-size: 0.5rem; color: #444; margin-top: 5px; letter-spacing: 2px;">GENETIC SEQUENCE</div>
        </div>

        <div class="interface">
            <div class="knob-group">
                <div class="knob"><input type="range" id="drive" min="1" max="20" value="6"><div class="label">DRIVE</div></div>
                <div class="knob"><input type="range" id="tone" min="400" max="15000" value="5000"><div class="label">TONE</div></div>
                <div class="knob"><input type="range" id="mix" min="0" max="100" value="100"><div class="label">MIX</div></div>
            </div>

            <div class="stomp-section">
                <div class="led mutate-led" id="autoLed"></div>
                <div class="stomp" onclick="toggleAutoMutate()">AUTO EVOLVE</div>
            </div>

            <div class="stomp-section">
                <div class="led mutate-led" style="background:#320;" id="mutateLed"></div>
                <div class="stomp" onclick="manualMutate()">MUTATE 🧬</div>
            </div>

            <div class="stomp-section">
                <div class="led accent" id="micLed"></div>
                <div class="stomp" onclick="toggleMic()">MIC IN</div>
            </div>

            <div class="stomp-section">
                <div class="led" id="powerLed"></div>
                <div class="stomp" onclick="startEngine()">POWER</div>
            </div>
        </div>

        <div class="keys" id="keyboard"></div>
    </div>

    <canvas id="helixRight" class="helix-canvas"></canvas>
</div>

<script>
let audioCtx, dnaShaper, toneFilter, analyzer, masterBus;
let isMicActive = false, engineStarted = false, autoMutate = false;
let activeNotes = new Map();
const keyFreqs = { 'A': 130.81, 'S': 146.83, 'D': 164.81, 'F': 174.61, 'G': 196.00, 'H': 220.00, 'J': 246.94, 'K': 261.63 };

async function startEngine() {
    if (engineStarted) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    dnaShaper = audioCtx.createWaveShaper();
    toneFilter = audioCtx.createBiquadFilter();
    masterBus = audioCtx.createGain();
    analyzer = audioCtx.createAnalyser();
    analyzer.fftSize = 256;

    toneFilter.type = "lowpass";
    updateShaper();

    dnaShaper.connect(toneFilter);
    toneFilter.connect(masterBus);
    masterBus.connect(analyzer);
    analyzer.connect(audioCtx.destination);

    engineStarted = true;
    document.getElementById('powerLed').classList.add('on');
    buildKeyboard();
    drawAll();
}

function updateShaper() {
    const dna = document.getElementById('dnaInput').value.toUpperCase();
    const n = 44100, curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
        let x = (i * 2) / n - 1;
        for (let c of dna) {
            if (c === "A") x = Math.tanh(x * 1.8);
            if (c === "T") x = Math.sin(x * 1.5);
            if (c === "C") x = x > 0 ? Math.pow(x, 0.7) : -Math.pow(Math.abs(x), 0.7);
            if (c === "G") x = Math.atan(x * 2.2);
        }
        curve[i] = x;
    }
    if (dnaShaper) dnaShaper.curve = curve;
}

function manualMutate() {
    const bases = ["A", "T", "C", "G"];
    let newDna = Array.from({length: 8}, () => bases[Math.floor(Math.random() * 4)]).join('');
    document.getElementById('dnaInput').value = newDna;
    updateShaper();
    // Flash LED
    const mled = document.getElementById('mutateLed');
    mled.classList.add('on');
    setTimeout(() => mled.classList.remove('on'), 150);
}

function toggleAutoMutate() {
    autoMutate = !autoMutate;
    document.getElementById('autoLed').classList.toggle('on', autoMutate);
}

// Auto Evolution Loop
setInterval(() => {
    if (autoMutate) manualMutate();
}, 2500);

function playNote(freq, key) {
    if (!engineStarted || activeNotes.has(key)) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    const drive = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    drive.gain.value = document.getElementById('drive').value;
    env.gain.setValueAtTime(0, audioCtx.currentTime);
    env.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
    osc.connect(drive);
    drive.connect(env);
    env.connect(dnaShaper);
    osc.start();
    activeNotes.set(key, { osc, env });
    document.querySelector(`[data-key="${key}"]`)?.classList.add('playing');
}

function stopNote(key) {
    if (activeNotes.has(key)) {
        const { osc, env } = activeNotes.get(key);
        env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.stop(audioCtx.currentTime + 0.4);
        activeNotes.delete(key);
        document.querySelector(`[data-key="${key}"]`)?.classList.remove('playing');
    }
}

async function toggleMic() {
    if (!engineStarted) await startEngine();
    if (!isMicActive) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const micNode = audioCtx.createMediaStreamSource(stream);
            const micGain = audioCtx.createGain();
            micGain.gain.value = document.getElementById('drive').value;
            micNode.connect(micGain);
            micGain.connect(dnaShaper);
            window.activeStream = stream;
            isMicActive = true;
            document.getElementById('micLed').classList.add('on');
        } catch (e) { alert("Mic required"); }
    } else {
        window.activeStream.getTracks().forEach(t => t.stop());
        isMicActive = false;
        document.getElementById('micLed').classList.remove('on');
    }
}

function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    Object.keys(keyFreqs).forEach(k => {
        const div = document.createElement('div');
        div.className = 'key'; div.innerText = k; div.dataset.key = k;
        div.onmousedown = () => playNote(keyFreqs[k], k);
        div.onmouseup = () => stopNote(k);
        kb.appendChild(div);
    });
}

function drawAll() {
    requestAnimationFrame(drawAll);
    const buffer = new Uint8Array(analyzer.frequencyBinCount);
    analyzer.getByteFrequencyData(buffer);
    const vol = buffer.reduce((a, b) => a + b, 0) / buffer.length;
    const time = Date.now() * 0.002;

    [document.getElementById('helixLeft'), document.getElementById('helixRight')].forEach((canvas) => {
        const ctx = canvas.getContext('2d');
        canvas.width = 100; canvas.height = 600;
        const dna = document.getElementById('dnaInput').value;
        const colors = { A: '#00f2ff', T: '#ff00ea', C: '#22ff00', G: '#ffcc00' };
        for (let i = 0; i < 20; i++) {
            const char = dna[i % dna.length];
            const y = (i / 20) * 600;
            const xOff = Math.sin(time + i * 0.5) * (25 + vol * 0.7);
            ctx.strokeStyle = colors[char] || '#fff';
            ctx.globalAlpha = 0.3;
            ctx.beginPath(); ctx.moveTo(50+xOff, y); ctx.lineTo(50-xOff, y); ctx.stroke();
            ctx.globalAlpha = 1.0; ctx.fillStyle = colors[char] || '#fff';
            [xOff, -xOff].forEach(x => { ctx.beginPath(); ctx.arc(50+x, y, 3 + vol/40, 0, Math.PI*2); ctx.fill(); });
        }
    });

    const sCanvas = document.getElementById('scope');
    const sCtx = sCanvas.getContext('2d');
    sCanvas.width = window.innerWidth; sCanvas.height = 80;
    const tData = new Uint8Array(analyzer.frequencyBinCount);
    analyzer.getByteTimeDomainData(tData);
    sCtx.strokeStyle = isMicActive ? "var(--accent)" : "var(--neon)";
    sCtx.lineWidth = 3; sCtx.beginPath();
    for (let i = 0; i < tData.length; i++) {
        const x = (i / tData.length) * sCanvas.width;
        const y = (tData[i] / 255) * 80;
        if (i === 0) sCtx.moveTo(x, y); else sCtx.lineTo(x, y);
    }
    sCtx.stroke();

    if (engineStarted) toneFilter.frequency.setTargetAtTime(document.getElementById('tone').value, audioCtx.currentTime, 0.1);
}

document.getElementById('dnaInput').addEventListener('input', (e) => {
    e.target.value = e.target.value.toUpperCase().replace(/[^ATCG]/g, '');
    updateShaper();
});

window.addEventListener('keydown', e => { if(keyFreqs[e.key.toUpperCase()]) playNote(keyFreqs[e.key.toUpperCase()], e.key.toUpperCase()); });
window.addEventListener('keyup', e => stopNote(e.key.toUpperCase()));
</script>
</body>
</html>
